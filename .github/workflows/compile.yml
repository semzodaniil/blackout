name: Compile BlackOut

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      - name: Add M5Stack board manager URL
        run: |
          arduino-cli config add board_manager.additional_urls https://m5stack.oss-cn-shenzhen.aliyuncs.com/resource/arduino/package_m5stack_index.json

      - name: Update index and install M5Stack core
        run: |
          arduino-cli core update-index
          arduino-cli core install m5stack:esp32

      - name: Install M5StickCPlus library
        run: |
          arduino-cli lib install "M5StickCPlus"

      - name: Compile firmware for M5StickC Plus2
        run: |
          arduino-cli compile --fqbn m5stack:esp32:m5stack_stickc_plus2 blackout.ino

      - name: Find and copy .bin file from anywhere
        run: |
          # Вывести все файлы в дереве проекта для отладки
          echo "=== Список всех файлов ==="
          find . -type f
          echo "==========================="
          # Ищем любой .bin
          BIN_FILE=$(find . -name "*.bin" -type f | head -n 1)
          if [ -z "$BIN_FILE" ]; then
            echo "Ошибка: .bin файл не найден!"
            exit 1
          fi
          echo "Найден .bin: $BIN_FILE"
          cp "$BIN_FILE" firmware.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlackOut-firmware
          path: firmware.bin
