name: Compile BlackOut

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      - name: Add M5Stack board manager URL
        run: |
          arduino-cli config add board_manager.additional_urls https://m5stack.oss-cn-shenzhen.aliyuncs.com/resource/arduino/package_m5stack_index.json

      - name: Update index and install M5Stack core
        run: |
          arduino-cli core update-index
          arduino-cli core install m5stack:esp32

      - name: List all available boards (full output)
        run: |
          arduino-cli board listall --format text

      - name: Compile firmware (auto-detect board name)
        run: |
          # Ищем точное имя платы, содержащее "m5stick" или "stick"
          BOARD=$(arduino-cli board listall --format text | grep -i "m5stick" | head -1 | awk '{print $1}' | cut -d':' -f2)
          if [ -z "$BOARD" ]; then
            BOARD="m5stick-c"  # fallback
          fi
          echo "Using board: $BOARD"
          arduino-cli compile --fqbn m5stack:esp32:$BOARD blackout.ino

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlackOut-firmware
          path: build/m5stack.esp32.*/blackout.ino.bin
