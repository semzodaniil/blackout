name: Compile BlackOut

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Arduino CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          sudo mv bin/arduino-cli /usr/local/bin/

      - name: Add M5Stack board manager URL
        run: |
          arduino-cli config add board_manager.additional_urls https://m5stack.oss-cn-shenzhen.aliyuncs.com/resource/arduino/package_m5stack_index.json

      - name: Update index and install M5Stack core
        run: |
          arduino-cli core update-index
          arduino-cli core install m5stack:esp32

      - name: List all boards (to see exact name)
        run: |
          arduino-cli board listall | grep -i m5stick

      - name: Compile firmware (try m5stick-c-plus)
        run: |
          arduino-cli compile --fqbn m5stack:esp32:m5stick-c-plus blackout.ino
        continue-on-error: true

      - name: If failed, try m5stick-c
        run: |
          arduino-cli compile --fqbn m5stack:esp32:m5stick-c blackout.ino
        if: failure()
